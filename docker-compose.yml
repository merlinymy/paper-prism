services:
  # --- Vector Database ---
  qdrant:
    image: qdrant/qdrant:latest
    container_name: prism-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3

  # --- Backend API ---
  backend:
    build: ./backend
    container_name: prism-backend
    depends_on:
      qdrant:
        condition: service_healthy
    env_file: .env
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - DATABASE_URL=sqlite:///./data/app.db
      - PDF_SOURCE_DIR=/app/papers
      - UPLOAD_DIR=/app/papers
      - PROCESSED_DATA_DIR=/app/processed_data
    ports:
      - "8000:8000"
    volumes:
      - papers:/app/papers
      - app_data:/app/data
      - processed_data:/app/processed_data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/quick"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # --- Frontend ---
  frontend:
    build: ./frontend
    container_name: prism-frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:80"
    restart: unless-stopped

# Named volumes persist across container restarts, shutdowns, and reboots.
# Your papers, conversations, and vector embeddings are safe.
#
# To back up:    docker compose cp backend:/app/papers ./backup_papers
# To destroy:    docker compose down -v  (⚠️ DELETES ALL DATA)
volumes:
  qdrant_data:      # Vector embeddings and indices
  papers:           # Uploaded PDF files
  app_data:         # SQLite database (conversations, users, preferences)
  processed_data:   # Indexing checkpoints, BM25 cache
